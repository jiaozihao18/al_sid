data:
  batch_size: 2048
  num_workers: 4
  train_root: 'datas/reconstruct_data_mask.npz'
  val_root: ''
  train_clip_i2i: [
    'datas/contrastive_data_mask.npz',
  ]
  save_prefix: 'RQVAE_3_8192'

model:
  input_dim: 512
  codebook_size: 8192
  codebook_dim: 64
  codebook_num: 3
  latent_loss_weight: 0
  latent_weight: '[0.5, 0.5]'
  loss_type: 'mse'
  shared_codebook: False
  restart_unused_codes: True
  VQ_ema: False
  decay: 0.99
  do_bn: False
  rotation_trick: False

train:
  start_epoch: 0
  epochs: 150
  warmup_epochs: 40
  lr: 0.002
  blr: 0.0002
  min_lr: 1e-7
  weight_decay: 0.0001
  accum_iter: 1

  optimizer:
    name: adamw
    eps: 1e-8
    betas: [0.9, 0.999]

eval:
  valid_batch_size: 2048  # 评估时的batch size
  stats_freq: 1  # 每N个epoch统计一次码本利用率和商品冲突率（0表示禁用，只在最后一个epoch统计）
  collision_sample_ratio: 0.1  # 商品冲突率统计的采样比例（0.0-1.0），0.1表示采样10%的数据

resume: ''

# 单机单卡时使用的 NPU 编号；多卡时由 torchrun 通过环境变量 LOCAL_RANK 注入，不读此配置
dist:
  npu_id: 0

seed: 0
output_dir: ''
log_step: 50
